services:
  - type: web
    name: mo2log-backend
    env: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_VERSION
        value: 7.1.0
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SECRET_KEY
        generateValue: true
databases:
  - name: mo2log-postgres
    databaseName: mo2log
    user: mo2log
