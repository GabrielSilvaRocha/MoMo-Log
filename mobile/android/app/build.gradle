plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
}

android {
    namespace "br.com.mo2log.mobile"
    compileSdk 35

    defaultConfig {
        applicationId "br.com.mo2log.mobile"
        minSdk 26
        targetSdk 35
        versionCode 813
        versionName "8.1.3"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}


dependencies {
    implementation "androidx.webkit:webkit:1.14.0"
}
